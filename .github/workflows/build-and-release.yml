name: Build And Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements.txt pyinstaller

      - name: Run Tests
        shell: pwsh
        run: |
          .\.venv\Scripts\python -m unittest discover -s tests -v

      - name: Build EXE
        shell: cmd
        run: build_exe.bat

      - name: Smoke Test EXE
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\ShenYin.exe" -ArgumentList "--host","127.0.0.1","--port","19876","--no-browser" -PassThru -NoNewWindow
          Start-Sleep -Seconds 5
          try {
            $resp = Invoke-WebRequest -Uri "http://127.0.0.1:19876/" -UseBasicParsing -TimeoutSec 10
            if ($resp.StatusCode -ne 200) { throw "HTTP $($resp.StatusCode)" }
            Write-Host "Smoke test passed: HTTP 200"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShenYin-win-x64-${{ github.ref_name }}
          path: dist/ShenYin.exe
          retention-days: 14

  build-macos-arm64:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        shell: bash
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt pyinstaller

      - name: Run Tests
        shell: bash
        run: |
          .venv/bin/python -m unittest discover -s tests -v

      - name: Build App
        shell: bash
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Smoke Test App
        shell: bash
        run: |
          set -e
          dist/ShenYin.app/Contents/MacOS/ShenYin --host 127.0.0.1 --port 19876 --no-browser &
          app_pid=$!
          sleep 5
          if ! curl --connect-timeout 5 --max-time 10 --fail --silent --show-error "http://127.0.0.1:19876/"; then
            kill $app_pid || true
            wait $app_pid || true
            exit 1
          fi
          kill $app_pid || true
          wait $app_pid || true

      - name: Archive App
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent ShenYin.app ShenYin-macos-arm64.zip

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShenYin-macos-arm64-${{ github.ref_name }}
          path: dist/ShenYin-macos-arm64.zip
          retention-days: 14

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: ShenYin-win-x64-${{ github.ref_name }}
          path: dist

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ShenYin-macos-arm64-${{ github.ref_name }}
          path: dist

      - name: Move Latest Tag
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin refs/tags/latest --force

      - name: Publish Latest Prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest Build
          body: |
            Rolling build from `main` (Windows x64 + macOS arm64).

            Commit: `${{ github.sha }}`
          prerelease: true
          make_latest: false
          files: |
            dist/ShenYin.exe
            dist/ShenYin-macos-arm64.zip
          overwrite_files: true

      - name: Publish Version Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Release v${{ github.ref_name }}
            - 新增 macOS Apple Silicon（M1+）版本：`ShenYin-macos-arm64.zip`
            - 继续提供 Windows 版本：`ShenYin.exe`
            - macOS 应用未签名，首次打开可能需要在系统安全设置中手动允许
            - CI 构建与发布流程更新为 Windows + macOS 双平台产物
          files: |
            dist/ShenYin.exe
            dist/ShenYin-macos-arm64.zip
          overwrite_files: true
          make_latest: true
