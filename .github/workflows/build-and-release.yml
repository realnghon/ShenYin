name: Build And Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ShenYin-windows-x64
            artifact_path: dist/ShenYin-windows-x64.exe
          - label: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ShenYin-linux-x64
            artifact_path: dist/ShenYin-linux-x64.tar.gz
          - label: macOS arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact_name: ShenYin-macos-arm64
            artifact_path: dist/ShenYin-macos-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ""

      - name: Run Rust tests
        run: cargo test --locked

      - name: Build Rust release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Prepare macOS signing identity
        if: runner.os == 'macOS' && secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != ''
        shell: bash
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/shenyin-signing.keychain-db"
          cert_path="$RUNNER_TEMP/shenyin-signing.p12"
          echo "$MACOS_CERTIFICATE_P12" | base64 -D > "$cert_path"
          security create-keychain -p "${MACOS_KEYCHAIN_PASSWORD:-temp-password}" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "${MACOS_KEYCHAIN_PASSWORD:-temp-password}" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "${MACOS_KEYCHAIN_PASSWORD:-temp-password}" "$keychain_path"
          identity="$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\\(.*\\)"/\\1/p' | head -n 1)"
          if [[ -z "$identity" ]]; then
            echo "No codesigning identity found in imported certificate." >&2
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\package-windows.ps1 -Target '${{ matrix.target }}' -Profile release -OutputDir dist

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x scripts/package-linux.sh
          ./scripts/package-linux.sh '${{ matrix.target }}' release dist

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        env:
          CODESIGN_IDENTITY: ${{ env.CODESIGN_IDENTITY }}
        run: |
          chmod +x scripts/package-macos-app.sh
          ./scripts/package-macos-app.sh '${{ matrix.target }}' release dist

      - name: Notarize macOS artifact
        if: runner.os == 'macOS' && env.CODESIGN_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != ''
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool submit dist/ShenYin-macos-arm64.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm -rf notarize
          mkdir -p notarize
          ditto -x -k dist/ShenYin-macos-arm64.zip notarize
          xcrun stapler staple notarize/ShenYin.app
          ditto -c -k --sequesterRsrc --keepParent notarize/ShenYin.app dist/ShenYin-macos-arm64.zip

      - name: Smoke test Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\ShenYin-windows-x64.exe" -ArgumentList "--host","127.0.0.1","--port","19876","--no-browser" -PassThru -NoNewWindow
          $passed = $false
          try {
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              try {
                $resp = Invoke-WebRequest -Uri "http://127.0.0.1:19876/" -UseBasicParsing -TimeoutSec 5
                if ($resp.StatusCode -eq 200) {
                  Write-Host "Smoke test passed: HTTP 200"
                  $passed = $true
                  break
                }
              } catch {
                if ($proc.HasExited) {
                  throw "Packaged Windows app exited before responding."
                }
              }
            }
            if (-not $passed) {
              throw "Timed out waiting for the Windows artifact to return HTTP 200."
            }
          } finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Smoke test Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf smoke
          mkdir -p smoke
          tar -xzf dist/ShenYin-linux-x64.tar.gz -C smoke
          chmod +x smoke/ShenYin-linux-x64/ShenYin
          smoke/ShenYin-linux-x64/ShenYin --host 127.0.0.1 --port 19876 --no-browser &
          app_pid=$!
          cleanup() {
            kill "$app_pid" >/dev/null 2>&1 || true
            wait "$app_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl --connect-timeout 2 --max-time 5 --fail --silent --show-error "http://127.0.0.1:19876/" >/dev/null; then
              echo "Smoke test passed: HTTP 200"
              exit 0
            fi
            if ! kill -0 "$app_pid" >/dev/null 2>&1; then
              echo "Packaged Linux app exited before responding." >&2
              exit 1
            fi
            sleep 1
          done
          echo "Timed out waiting for the Linux artifact to return HTTP 200." >&2
          exit 1

      - name: Smoke test macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf smoke
          mkdir -p smoke
          ditto -x -k dist/ShenYin-macos-arm64.zip smoke
          smoke/ShenYin.app/Contents/MacOS/ShenYin --host 127.0.0.1 --port 19876 --no-browser &
          app_pid=$!
          cleanup() {
            kill "$app_pid" >/dev/null 2>&1 || true
            wait "$app_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl --connect-timeout 2 --max-time 5 --fail --silent --show-error "http://127.0.0.1:19876/" >/dev/null; then
              echo "Smoke test passed: HTTP 200"
              exit 0
            fi
            if ! kill -0 "$app_pid" >/dev/null 2>&1; then
              echo "Packaged macOS app exited before responding." >&2
              exit 1
            fi
            sleep 1
          done
          echo "Timed out waiting for the macOS artifact to return HTTP 200." >&2
          exit 1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 14

      - name: Cleanup macOS signing keychain
        if: always() && runner.os == 'macOS' && env.MACOS_SIGNING_KEYCHAIN != ''
        shell: bash
        run: |
          security delete-keychain "$MACOS_SIGNING_KEYCHAIN" || true

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: ShenYin-windows-x64
          path: dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: ShenYin-linux-x64
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: ShenYin-macos-arm64
          path: dist

      - name: Remove stale version assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name' 2>/dev/null | while read -r asset; do
            gh release delete-asset "${{ github.ref_name }}" "$asset" --yes
          done || true

      - name: Publish version release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            - Windows x64: `ShenYin-windows-x64.exe`
            - Linux x64: `ShenYin-linux-x64.tar.gz`
            - macOS arm64: `ShenYin-macos-arm64.zip`
            - 文本与文件加密/解密功能已完整迁移到 Rust
            - 保持与原版兼容的 AES-256-GCM + PBKDF2 + Base85 文本传输协议
            - 关闭应用页面后会自动停止本地 API 服务，避免后台继续占用端口
            - macOS release is notarized when Apple signing secrets are configured; otherwise CI falls back to ad-hoc signing and first launch may still require a manual allow step
          overwrite_files: true
          make_latest: true
          files: |
            dist/ShenYin-windows-x64.exe
            dist/ShenYin-linux-x64.tar.gz
            dist/ShenYin-macos-arm64.zip
