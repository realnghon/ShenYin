name: Build And Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements.txt pyinstaller

      - name: Run Tests
        shell: pwsh
        run: |
          .\.venv\Scripts\python -m unittest discover -s tests -v

      - name: Build EXE
        shell: cmd
        run: build_exe.bat

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-workspace-${{ github.ref_name }}
          path: dist/local-workspace.exe
          retention-days: 14

      - name: Move Latest Tag
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin refs/tags/latest --force

      - name: Publish Latest Prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest Build
          body: |
            Rolling build from `main`.

            Commit: `${{ github.sha }}`
          prerelease: true
          make_latest: false
          files: dist/local-workspace.exe
          overwrite_files: true

      - name: Publish Version Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/local-workspace.exe
          overwrite_files: true
          make_latest: true
