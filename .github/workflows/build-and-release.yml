name: Build And Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ShenYin-win-x64
            artifact_path: dist/ShenYin.exe
          - label: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ShenYin-linux-x64
            artifact_path: dist/ShenYin-linux-x64.tar.gz
          - label: macOS arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact_name: ShenYin-macos-arm64
            artifact_path: dist/ShenYin-macos-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ""

      - name: Run Rust tests
        run: cargo test --locked

      - name: Build Rust release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\package-windows.ps1 -Target '${{ matrix.target }}' -Profile release -OutputDir dist

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x scripts/package-linux.sh
          ./scripts/package-linux.sh '${{ matrix.target }}' release dist

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x scripts/package-macos-app.sh
          ./scripts/package-macos-app.sh '${{ matrix.target }}' release dist

      - name: Smoke test Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\ShenYin.exe" -ArgumentList "--host","127.0.0.1","--port","19876","--no-browser" -PassThru -NoNewWindow
          $passed = $false
          try {
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              try {
                $resp = Invoke-WebRequest -Uri "http://127.0.0.1:19876/" -UseBasicParsing -TimeoutSec 5
                if ($resp.StatusCode -eq 200) {
                  Write-Host "Smoke test passed: HTTP 200"
                  $passed = $true
                  break
                }
              } catch {
                if ($proc.HasExited) {
                  throw "Packaged Windows app exited before responding."
                }
              }
            }
            if (-not $passed) {
              throw "Timed out waiting for the Windows artifact to return HTTP 200."
            }
          } finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Smoke test Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf smoke
          mkdir -p smoke
          tar -xzf dist/ShenYin-linux-x64.tar.gz -C smoke
          chmod +x smoke/ShenYin-linux-x64/ShenYin
          smoke/ShenYin-linux-x64/ShenYin --host 127.0.0.1 --port 19876 --no-browser &
          app_pid=$!
          cleanup() {
            kill "$app_pid" >/dev/null 2>&1 || true
            wait "$app_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl --connect-timeout 2 --max-time 5 --fail --silent --show-error "http://127.0.0.1:19876/" >/dev/null; then
              echo "Smoke test passed: HTTP 200"
              exit 0
            fi
            if ! kill -0 "$app_pid" >/dev/null 2>&1; then
              echo "Packaged Linux app exited before responding." >&2
              exit 1
            fi
            sleep 1
          done
          echo "Timed out waiting for the Linux artifact to return HTTP 200." >&2
          exit 1

      - name: Smoke test macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf smoke
          mkdir -p smoke
          ditto -x -k dist/ShenYin-macos-arm64.zip smoke
          smoke/ShenYin.app/Contents/MacOS/ShenYin --host 127.0.0.1 --port 19876 --no-browser &
          app_pid=$!
          cleanup() {
            kill "$app_pid" >/dev/null 2>&1 || true
            wait "$app_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl --connect-timeout 2 --max-time 5 --fail --silent --show-error "http://127.0.0.1:19876/" >/dev/null; then
              echo "Smoke test passed: HTTP 200"
              exit 0
            fi
            if ! kill -0 "$app_pid" >/dev/null 2>&1; then
              echo "Packaged macOS app exited before responding." >&2
              exit 1
            fi
            sleep 1
          done
          echo "Timed out waiting for the macOS artifact to return HTTP 200." >&2
          exit 1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 14

  release:
    name: Publish release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ShenYin-win-x64
          path: dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ShenYin-linux-x64
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ShenYin-macos-arm64
          path: dist

      - name: Move latest tag
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin refs/tags/latest --force

      - name: Remove stale latest assets
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view latest --json assets --jq '.assets[].name' 2>/dev/null | while read -r asset; do
            gh release delete-asset latest "$asset" --yes
          done || true

      - name: Remove stale version assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name' 2>/dev/null | while read -r asset; do
            gh release delete-asset "${{ github.ref_name }}" "$asset" --yes
          done || true

      - name: Publish latest prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest Build
          body: |
            Rolling Rust baseline build from `main`.

            Assets:
            - `ShenYin.exe`
            - `ShenYin-linux-x64.tar.gz`
            - `ShenYin-macos-arm64.zip`

            This prerelease validates the three-platform Rust startup and packaging pipeline.
            Commit: `${{ github.sha }}`
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            dist/ShenYin.exe
            dist/ShenYin-linux-x64.tar.gz
            dist/ShenYin-macos-arm64.zip

      - name: Publish version release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            - Windows x64: `ShenYin.exe`
            - Linux x64: `ShenYin-linux-x64.tar.gz`
            - macOS arm64: `ShenYin-macos-arm64.zip`
            - macOS `.app` remains unsigned and may require a manual allow step on first launch
            - This release establishes the Rust startup, packaging, and GitHub Actions publish baseline
          overwrite_files: true
          make_latest: true
          files: |
            dist/ShenYin.exe
            dist/ShenYin-linux-x64.tar.gz
            dist/ShenYin-macos-arm64.zip
